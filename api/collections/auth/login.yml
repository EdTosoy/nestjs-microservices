info:
  name: login
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:3000/auth/login
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "test@test.com",
        "password": "password123"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
